<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Universe Redacted (TUR)</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0a;
      color: #00ff00;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #app {
      width: 900px;
      max-width: 95%;
      background: #111;
      border: 2px solid #00ff00;
      padding: 20px;
      box-shadow: 0 0 30px #00ff0044;
      border-radius: 8px;
      position: relative;
    }
    button {
      background: #222;
      color: #00ff00;
      border: 1px solid #00ff00;
      padding: 5px 12px;
      margin: 4px;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      border-radius: 4px;
    }
    button:hover {
      background: #00ff00;
      color: #000;
    }
    input, select, textarea {
      background: #000;
      color: #00ff00;
      border: 1px solid #00ff00;
      padding: 6px;
      font-family: inherit;
      margin: 3px;
      border-radius: 4px;
      width: 200px;
    }
    textarea {
      width: 100%;
      height: 60px;
      resize: vertical;
    }
    .section {
      margin: 15px 0;
      padding: 10px;
      border: 1px dashed #00ff0055;
    }
    .terminal-window {
      background: #000;
      border: 2px solid #00ff00;
      padding: 15px;
      height: 300px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      white-space: pre-wrap;
      margin: 10px 0;
    }
    .progress-bar {
      display: inline-block;
      background: #111;
      padding: 2px;
    }
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal {
      background: #111;
      border: 2px solid #00ff00;
      padding: 25px;
      max-width: 600px;
      width: 90%;
      color: #00ff00;
      box-shadow: 0 0 50px #00ff00;
    }
    .close-btn {
      float: right;
      background: transparent;
      border: none;
      color: #ff0000;
      font-size: 18px;
      cursor: pointer;
    }
    .avatar-small {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #333;
      border: 1px solid #00ff00;
      display: inline-block;
      vertical-align: middle;
      object-fit: cover;
    }
    .flex-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    hr {
      border-color: #00ff0044;
      margin: 10px 0;
    }
    .red {
      color: #ff5555;
    }
    .blink {
      animation: blink 1s infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    [hidden] { display: none !important; }
  </style>
</head>

    let currentLang = localStorage.getItem('tur_lang') || 'ru';
    function t(key) {
      return LANG[currentLang]?.[key] || key;
    }

    // ==================== ДАННЫЕ ====================
    const STORAGE_KEYS = {
      users: 'tur_users',
      currentUserId: 'tur_currentUserId',
      nextUserId: 'tur_nextUserId',
      universes: 'tur_universes',
      cdoe: 'tur_cdoe',
      terminalFS: 'tur_terminalFS',
      chats: 'tur_chats',
      typing: 'tur_typing',
      screenText: 'tur_screenText',
      lastActive: 'tur_lastActive'
    };
    
    const PRIVATE_AVATAR_PLACEHOLDER = 'gallery/private_avatar.png';
    
    const SITE_CREATION_TIME_KEY = 'tur_siteCreationTime';
function getSiteCreationTime() {
    let time = localStorage.getItem(SITE_CREATION_TIME_KEY);
    if (!time) {
        time = Date.now().toString();
        localStorage.setItem(SITE_CREATION_TIME_KEY, time);
    }
    return parseInt(time);
}
    
    let nanosecondCounter = 0;
let lastNanosecondLog = Date.now();

function startNanosecondTimer() {
    setInterval(() => {
        const now = Date.now();
        const elapsedMs = now - lastNanosecondLog;
        // 1 миллисекунда = 1 000 000 наносекунд
        const nanosecondsPassed = Math.floor(elapsedMs * 1000000);
        if (nanosecondsPassed >= 1) {
            nanosecondCounter += nanosecondsPassed;
            lastNanosecondLog = now;
            addCDOE({ userId: 'System', action: `CDOE: ${nanosecondCounter} nanosecond is successfully passed, abort..` });
        }
    }, 3600000); // проверка каждую миллисекунду
}
    
    function getUsers() {
      return JSON.parse(localStorage.getItem(STORAGE_KEYS.users) || '[]');
    }
    function saveUsers(users) {
      localStorage.setItem(STORAGE_KEYS.users, JSON.stringify(users));
    }
    function getCurrentUserId() {
      return localStorage.getItem(STORAGE_KEYS.currentUserId);
    }
    function setCurrentUserId(id) {
      localStorage.setItem(STORAGE_KEYS.currentUserId, id);
    }
    function getNextUserId() {
      let n = parseInt(localStorage.getItem(STORAGE_KEYS.nextUserId) || '128');
      if (n < 128) n = 128;
      return n;
    }
    function incNextUserId() {
      let n = getNextUserId() + 1;
      if (n > 9223372036854775807) n = 9223372036854775807;
      localStorage.setItem(STORAGE_KEYS.nextUserId, n.toString());
      return n - 1;
    }
    function getUniverses() {
      return JSON.parse(localStorage.getItem(STORAGE_KEYS.universes) || '[]');
    }
    function saveUniverses(arr) {
      localStorage.setItem(STORAGE_KEYS.universes, JSON.stringify(arr));
    }
    function getCDOE() {
      return JSON.parse(localStorage.getItem(STORAGE_KEYS.cdoe) || '[]');
    }
    function addCDOE(entry) {
      const arr = getCDOE();
      arr.push({ ...entry, num: arr.length + 1, date: new Date().toISOString() });
      localStorage.setItem(STORAGE_KEYS.cdoe, JSON.stringify(arr));
    }
    function getTerminalFS() {
      return JSON.parse(localStorage.getItem(STORAGE_KEYS.terminalFS) || '{"home":{"user":{}}}');
    }
    function saveTerminalFS(fs) {
      localStorage.setItem(STORAGE_KEYS.terminalFS, JSON.stringify(fs));
    }
    function getChats() {
      return JSON.parse(localStorage.getItem(STORAGE_KEYS.chats) || '{}');
    }
    function saveChats(obj) {
      localStorage.setItem(STORAGE_KEYS.chats, JSON.stringify(obj));
    }

    // ==================== ИНИЦИАЛИЗАЦИЯ ПОЛЬЗОВАТЕЛЯ ====================
    function initUser() {
      let users = getUsers();
      let currentId = getCurrentUserId();
      if (!currentId || !users.find(u => u.id === currentId)) {
        // создаём нового
        const newId = incNextUserId().toString();
        const newUser = {
          id: newId,
          nickname: 'user_' + newId,
          description: '',
          note: '',
          avatar: '',
          visibility: 'public',
          followers: [],
          following: [],
          achievements: [],
          ban: null,
          logs: [],
          lastActive: Date.now(),
          timeSpent: 0
        };
        users.push(newUser);
        saveUsers(users);
        setCurrentUserId(newId);
        return newUser;
      } else {
        let user = users.find(u => u.id === currentId);
        if (user) {
          user.lastActive = Date.now();
          saveUsers(users);
        }
        return user;
      }
    }

    let currentUser = initUser();
    window.addEventListener('beforeunload', () => {
      let users = getUsers();
      let u = users.find(x => x.id === currentUser.id);
      if (u) {
        u.timeSpent = (u.timeSpent || 0) + Math.floor((Date.now() - (u.lastActive || Date.now())) / 1000);
        u.lastActive = Date.now();
        saveUsers(users);
      }
    });

    // ==================== РЕНДЕРИНГ ====================
    const app = document.getElementById('app');

    function renderMain() {
      currentUser = getUsers().find(u => u.id === getCurrentUserId()) || initUser();
      if (currentUser.ban && currentUser.ban.until > Date.now()) {
        renderBanScreen(currentUser);
        return;
      }
      app.innerHTML = '';
      const html = `
        <div class="section">
          <h2>${t('title')}</h2>
          <div class="flex-row">
            <span>${t('setLang')}:</span>
            <select id="langSelect">
              <option value="ru" ${currentLang==='ru'?'selected':''}>RU 🇷🇺</option>
              <option value="en" ${currentLang==='en'?'selected':''}>EN 🇺🇸</option>
              <option value="it" ${currentLang==='it'?'selected':''}>IT 🇮🇹</option>
            </select>
          </div>
          <hr>
          <div><strong>${t('setAvatar')}:</strong> 
            <input type="file" id="avatarInput" accept="image/*"> 
            <img id="avatarPreview" class="avatar-small" src="${currentUser.avatar || ''}" style="${currentUser.avatar?'':'display:none'}">
            <span>${t('visibility')}: <select id="avatarVis">${['public','private'].map(v=>`<option value="${v}" ${currentUser.visibility===v?'selected':''}>${t(v)}</option>`).join('')}</select></span>
          </div>
          <div>${t('nickname')}: <input id="nicknameInput" value="${escapeHtml(currentUser.nickname)}"> <button id="saveProfile">${t('save')}</button></div>
          <div>${t('description')}: <textarea id="descInput">${escapeHtml(currentUser.description)}</textarea></div>
          <div>${t('note')}: <textarea id="noteInput">${escapeHtml(currentUser.note)}</textarea></div>
          <div>User id: ${currentUser.id}</div>
          <hr>
          <button id="redactorBtn">${t('redactor')}</button>
          <button id="userSearchBtn">${t('userSearch')}</button>
          <button id="terminalBtn">${t('terminal')} [>_]</button>
          <div id="redactorArea" hidden></div>
          <div id="searchArea" hidden></div>
        </div>
        <div id="modalContainer"></div>
      `;
      app.innerHTML = html;
      document.getElementById('langSelect').onchange = (e) => {
        currentLang = e.target.value;
        localStorage.setItem('tur_lang', currentLang);
        renderMain();
      };
      document.getElementById('saveProfile').onclick = () => {
        let users = getUsers();
        let u = users.find(x => x.id === currentUser.id);
        if (u) {
          u.nickname = document.getElementById('nicknameInput').value || u.nickname;
          u.description = document.getElementById('descInput').value;
          u.note = document.getElementById('noteInput').value;
          u.visibility = document.getElementById('avatarVis').value;
          saveUsers(users);
          currentUser = u;
          addCDOE({ userId: currentUser.id, action: 'updated profile' });
        }
        renderMain();
      };
      document.getElementById('avatarInput').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = () => {
            let users = getUsers();
            let u = users.find(x => x.id === currentUser.id);
            if (u) {
              u.avatar = reader.result;
              saveUsers(users);
              currentUser = u;
              renderMain();
            }
          };
          reader.readAsDataURL(file);
        }
      };
      document.getElementById('redactorBtn').onclick = showRedactor;
      document.getElementById('userSearchBtn').onclick = showUserSearch;
      document.getElementById('terminalBtn').onclick = () => openTerminal();
    }

    function showRedactor() {
      const area = document.getElementById('redactorArea');
      area.hidden = !area.hidden;
      if (!area.hidden) {
        area.innerHTML = '';
        const universes = getUniverses().filter(u => u.ownerId === currentUser.id);
        area.innerHTML = `
          <div class="section">
            <button id="createUniverseBtn">${t('createUniverse')}</button>
            <h3>${t('universeList')} (${universes.length})</h3>
            <div id="universeListContainer"></div>
          </div>
        `;
        document.getElementById('createUniverseBtn').onclick = renderCreateUniverse;
        renderUniverseList(universes);
      }
    }

    function renderUniverseList(universes) {
      const container = document.getElementById('universeListContainer');
      if (!container) return;
      container.innerHTML = universes.length ? universes.map(u => {
        const destroyed = u.destroyed || u.size >= 1;
        return `
          <div class="section">
            <strong>${t('name')}:</strong> ${escapeHtml(u.name)}<br>
            ${t('created')}: ${u.createdDate} ${u.createdTime}<br>
            ${t('size')}: ${u.size.toFixed(8)} ${destroyed ? `<span class="red">(${t('destroyed')})</span>` : ''}<br>
            <button onclick="loginUniverse('${u.id}')" ${destroyed?'disabled':''}>${t('login')}</button>
            <button onclick="explodeUniverse('${u.id}')">${t('explode')}</button>
            <button onclick="removeUniverse('${u.id}')">${t('remove')}</button>
          </div>
        `;
      }).join('') : `<p>${t('noUniverses')}</p>`;
    }

    function renderCreateUniverse() {
      const modal = document.createElement('div');
      modal.className = 'overlay';
      modal.innerHTML = `
        <div class="modal">
          <span class="close-btn" id="closeCreate">[X]</span>
          <h3>${t('createUniverse')}</h3>
          <div>${t('name')}: <input id="uname" placeholder="Universe"></div>
          <div>${t('size')}: <input id="usize" type="number" step="any" placeholder="0.00000005"> (0-1)</div>
          <div>${t('power')}: <select id="upower"><option>Default</option><option>Powerful</option></select></div>
          <div>${t('state')}: <select id="ustate"><option>Normal</option><option>Fast</option><option>Force</option></select></div>
          <div>${t('updateUpgrade')}: <select id="udo"><option>Default</option><option>Force</option><option>Max</option><option>Ultra</option></select></div>
          <div>${t('action')}: <select id="uaction"><option>Default</option><option>Force</option><option>Max</option><option>Ultra</option></select></div>
          <div>${t('connect')}: <select id="uconnect"><option>Default</option><option>Force</option><option>Max</option><option>Ultra</option></select></div>
          <button id="createUniverseConfirm">${t('create')}</button>
          <button id="cancelCreate">${t('cancel')}</button>
        </div>
      `;
      document.body.appendChild(modal);
      document.getElementById('closeCreate').onclick = () => modal.remove();
      document.getElementById('cancelCreate').onclick = () => modal.remove();
      document.getElementById('createUniverseConfirm').onclick = () => {

        const size = parseFloat(document.getElementById('usize').value) || 0;
        const power = document.getElementById('upower').value;
        const state = document.getElementById('ustate').value;
        const now = new Date();
        const uni = {
          id: Date.now().toString(36) + Math.random().toString(36).substr(2),
          name,
          ownerId: currentUser.id,
          createdDate: now.toLocaleDateString(),
          createdTime: now.toLocaleTimeString(),
          size: Math.min(1, Math.max(0, size)),
          power,
          state,
          destroyed: false,
          lastUpdate: Date.now()
        };
        const universes = getUniverses();
        universes.push(uni);
        saveUniverses(universes);
        addCDOE({ userId: currentUser.id, action: `created universe ${name}` });
        modal.remove();
        showRedactor();
      };
    }

    window.loginUniverse = function(id) {
      const universes = getUniverses();
      const uni = universes.find(u => u.id === id);
      if (!uni || uni.destroyed) return;
      updateUniverseSize(uni);
      const modal = document.createElement('div');
      modal.className = 'overlay';
      modal.innerHTML = `
        <div class="modal" style="max-width:800px">
          <span class="close-btn" id="closeUniView">[X]</span>
          <h3>${t('uoew')}: ${escapeHtml(uni.name)}</h3>
          <div class="terminal-window" id="uoewDisplay" style="height:200px">↑ Universe<br>${'·'.repeat(50)}</div>
          <div>${t('age')}: <span id="uniAge"></span> | ${t('size')}: <span id="uniSize"></span></div>
          <h4>${t('cdoe')}</h4>
          <div class="terminal-window" id="cdoeDisplay" style="height:200px"></div>
        </div>
      `;
      document.body.appendChild(modal);
      const closeBtn = document.getElementById('closeUniView');
      closeBtn.onclick = () => modal.remove();
      const updateDisplay = () => {
        const u = getUniverses().find(x => x.id === id);
        if (!u) { modal.remove(); return; }
        updateUniverseSize(u);
        document.getElementById('uniAge').textContent = (u.size * 1e8).toFixed(2) + ' units';
        document.getElementById('uniSize').textContent = u.size.toFixed(8);
        const cdoe = getCDOE().slice(-20).map(e => `[${e.num}] ${new Date(e.date).toLocaleString()} user "${e.userId}" ${e.action}`).join('\n');
        document.getElementById('cdoeDisplay').textContent = cdoe || '--';
        document.getElementById('uoewDisplay').innerHTML = `↑ Universe<br>${'·'.repeat(Math.floor(u.size * 50))}`;
      };
      updateDisplay();
      const interval = setInterval(updateDisplay, 1000);
      modal.addEventListener('close', () => clearInterval(interval));
      closeBtn.addEventListener('click', () => clearInterval(interval));
      addCDOE({ userId: currentUser.id, action: `logged in universe ${uni.name}` });
    };

    function updateUniverseSize(uni) {
      if (uni.destroyed || uni.size >= 1) {
        uni.destroyed = true;
        uni.size = 1;
        return;
      }
      const now = Date.now();
      const elapsed = (now - uni.lastUpdate) / 1000;
      let rate = 0.00000005;
      if (uni.state === 'Fast') rate = 0.000005;
      else if (uni.state === 'Force') rate = 0.0005;
      if (uni.power === 'Powerful') rate *= 100;
      uni.size = Math.min(1, uni.size + rate * elapsed);
      uni.lastUpdate = now;
      if (uni.size >= 1) uni.destroyed = true;
      const universes = getUniverses();
      const idx = universes.findIndex(u => u.id === uni.id);
      if (idx !== -1) universes[idx] = uni;
      saveUniverses(universes);
    }

    window.explodeUniverse = function(id) {
      const universes = getUniverses();
      const uni = universes.find(u => u.id === id);
      if (!uni) return;
      if (uni.destroyed) {
        alert(`rm: cannot remove '~/${uni.name}/root/': ${t('permissionDenied')}. ${t('destroyed')}.`);
        return;
      }
      simulateTerminalAction(`sudo rm -rf ~/${uni.name}/root/`, 1.5, () => {
        uni.destroyed = true;
        uni.size = 1;
        saveUniverses(universes);
        addCDOE({ userId: currentUser.id, action: `exploded universe ${uni.name}` });
        showRedactor();
      });
    };

    window.removeUniverse = function(id) {
      const universes = getUniverses();
      const uni = universes.find(u => u.id === id);
      if (!uni) return;
      if (uni.destroyed) {
        alert(`rm: cannot remove '~/${uni.name}/': ${t('permissionDenied')}. Universe already exploded.`);
        return;
      }
      simulateTerminalAction(`sudo rm -rf ~/${uni.name}/`, 2.5, () => {
        const idx = universes.findIndex(u => u.id === id);
        if (idx !== -1) universes.splice(idx, 1);
        saveUniverses(universes);
        addCDOE({ userId: currentUser.id, action: `removed universe ${uni.name}` });
        showRedactor();
      });
    };

    function simulateTerminalAction(command, durationSec, callback) {
      const modal = document.createElement('div');
      modal.className = 'overlay';
      modal.innerHTML = `
        <div class="modal">
          <span class="close-btn" id="closeTermAction">[X]</span>
          <div class="terminal-window" id="termActionOutput">tur@:~/#>${command}<br>Finding...<br></div>
          <div id="progressContainer"></div>
          <div><span id="approxTime"></span> | <span id="timeLeft"></span></div>
          <button id="cancelAction">${t('cancel')}</button>
        </div>
      `;
      document.body.appendChild(modal);
      const outputDiv = document.getElementById('termActionOutput');
      const progressDiv = document.getElementById('progressContainer');
      const approxSpan = document.getElementById('approxTime');
      const leftSpan = document.getElementById('timeLeft');
      let seconds = 0;
      const totalTicks = Math.ceil(durationSec * 10);
      let tick = 0;
      const interval = setInterval(() => {
        tick++;
        const percent = Math.min(100, Math.floor((tick / totalTicks) * 100));
        const hashes = '#'.repeat(percent);
        progressDiv.innerHTML = `[${hashes}${'·'.repeat(100-percent)}] ${percent}%`;
        approxSpan.textContent = `${t('approxTime')}: ${durationSec} ${t('seconds')}`;
        leftSpan.textContent = `${t('timeLeft')}: ${Math.max(0, (durationSec - seconds)).toFixed(1)} ${t('seconds')}`;
        seconds += 0.1;
        if (tick >= totalTicks) {
          clearInterval(interval);
          outputDiv.innerHTML += `\nOperation completed.`;
          setTimeout(() => {
            modal.remove();
            if (callback) callback();
          }, 500);
        }
      }, 100);
      document.getElementById('cancelAction').onclick = () => { clearInterval(interval); modal.remove(); };
      document.getElementById('closeTermAction').onclick = () => { clearInterval(interval); modal.remove(); };
    }

      };
      let mediaRecorder;
      document.getElementById('voiceRecordBtn').onmousedown = () => {
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
          mediaRecorder = new MediaRecorder(stream);

          mediaRecorder.onstop = () => {

    function openTerminal() {
      const modal = document.createElement('div');
      modal.className = 'overlay';
      modal.innerHTML = `
        <div class="modal" style="max-width:800px">
          <span class="close-btn" id="closeTerminal">[X]</span>
          <div class="terminal-window" id="terminalOutput" style="height:300px">tur@:~/#></div>
          <input id="terminalInput" style="width:100%" placeholder="команда">
        </div>
      `;
      document.body.appendChild(modal);
      const output = document.getElementById('terminalOutput');
      const input = document.getElementById('terminalInput');
      let cwd = '/home/user';
      const fs = getTerminalFS();
      const commands = {
        help: () => 'ls cd pwd echo cat mkdir touch rm rmdir date whoami clear uname',
        ls: () => {
          const dir = getDir(cwd);
          return dir ? Object.keys(dir).join(' ') : 'нет доступа';
        },
        pwd: () => cwd,
        cd: (args) => {
          if (args[0] === '..') { cwd = cwd.substring(0, cwd.lastIndexOf('/')) || '/'; return ''; }
          // упрощённо
          return '';
        },
        echo: (args) => args.join(' '),
        whoami: () => `user${currentUser.id}`,
        date: () => new Date().toString(),
        clear: () => { output.innerHTML = ''; return ''; }
      };
      function getDir(path) {
        const parts = path.split('/').filter(Boolean);
        let node = fs;
        for (const p of parts) { if (!node[p]) return null; node = node[p]; }
        return node;
      }
      input.onkeyup = (e) => {
        if (e.key === 'Enter') {
          const cmd = input.value.trim();
          input.value = '';
          output.innerHTML += `\ntur@:~/#> ${cmd}`;
          const [c, ...args] = cmd.split(' ');
          if (commands[c]) {
            const result = commands[c](args);
            if (result) output.innerHTML += `\n${result}`;
          } else {
            output.innerHTML += `\ncommand is not defined: '${cmd}': command is damaged or not exist.`;
          }
          output.scrollTop = output.scrollHeight;
        }
      };
      document.getElementById('closeTerminal').onclick = () => modal.remove();
    }

    function getProfileAvatarUrl(targetUser) {
    // Если смотрим свой профиль — показываем свой аватар всегда
    if (targetUser.id === currentUser.id) {
        return targetUser.avatar || '';
    }
    // Если чужой профиль и аватар приватный — показываем заглушку
    if (targetUser.visibility === 'private') {
        return PRIVATE_AVATAR_PLACEHOLDER;
    }
    // Если публичный — показываем как обычно
    return targetUser.avatar || '';
}
    
    function escapeHtml(text) {
      return String(text).replace(/[&<>"]/g, function(m) {
        return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[m];
      });
    }
